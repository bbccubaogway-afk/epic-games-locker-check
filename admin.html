<!DOCTYPE html>
<html>
<head>
<title>Admin Dashboard</title>
</head>
<body>

<h1>Messages</h1>

<ul id="messages"></ul>

<script src="/socket.io/socket.io.js"></script>

<script>
const socket = io();

socket.on("newMessage", (msg) => {
  const li = document.createElement("li");
  li.textContent = msg;
  document.getElementById("messages").appendChild(li);
});
</script>

</body>
</html>
